<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vue 2 & Bootstrap 4 - Excel Dropdown (Unique List)</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/css/bootstrap.min.css">
</head>
<body>

  <div id="app" class="container mt-5">
    <div class="row justify-content-center">
      <div class="col-md-8">
        
        <div class="card shadow-sm">
          <div class="card-body">
            <h5 class="card-title">직원 명부 엑셀 다운로드</h5>
            <h6 class="card-subtitle mb-3 text-muted">드롭다운 중복 제거 완벽 적용</h6>
            
            <div class="alert alert-info" role="alert">
              <strong>업데이트:</strong> 원본 데이터에 중복된 부서명이 섞여 있더라도, 엑셀 드롭다운 목록에는 <strong>중복이 완벽하게 제거된 고유한 부서명</strong>만 깔끔하게 노출됩니다.
            </div>

            <table class="table table-bordered text-center mt-3">
              <thead class="thead-light">
                <tr>
                  <th>ID (수정불가)</th>
                  <th>이름 (텍스트입력)</th>
                  <th>부서 (목록선택)</th>
                </tr>
              </thead>
              <tbody>
                <tr v-for="emp in employees" :key="emp.id">
                  <td>{{ emp.id }}</td>
                  <td>{{ emp.name }}</td>
                  <td>{{ emp.department }}</td>
                </tr>
              </tbody>
            </table>

            <div class="text-right">
              <button class="btn btn-success" @click="downloadExcel">
                엑셀 파일로 다운로드 (.xlsx)
              </button>
            </div>

          </div>
        </div>

      </div>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/js/bootstrap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vue@2.6.14/dist/vue.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

  <script>
    new Vue({
      el: '#app',
      data() {
        return {
          // 의도적으로 중복된 데이터가 포함된 원본 배열
          departmentList: ['개발팀', '디자인팀', '기획팀', '개발팀', '영업팀', '기획팀', '마케팅팀'],
          
          employees: [
            { id: 1, name: '홍길동', department: '개발팀' },
            { id: 2, name: '김철수', department: '디자인팀' },
            { id: 3, name: '이영희', department: '기획팀' },
            { id: 4, name: '박민수', department: '영업팀' }
          ]
        }
      },
      methods: {
        async downloadExcel() {
          try {
            const workbook = new ExcelJS.Workbook();
            
            // ==========================================
            // [핵심] 1. Set을 이용한 중복 제거 및 배열 변환
            // Set 객체는 중복을 허용하지 않는 특성이 있어, 이를 활용하면 쉽게 중복을 걸러낼 수 있습니다.
            // ==========================================
            const uniqueDepartments = [...new Set(this.departmentList)];
            
            /* [참고] 만약 부서 목록 배열이 따로 없고, 직원 데이터에서 직접 부서 종류를 뽑아내고 싶다면 아래처럼 작성하셔도 됩니다.
              const uniqueDepartments = [...new Set(this.employees.map(emp => emp.department))];
            */
            // ==========================================

            // 2. 드롭다운 데이터를 담을 '숨김 시트' 생성
            const listSheet = workbook.addWorksheet('데이터_목록');
            
            // 중복이 제거된 고유 배열(uniqueDepartments)을 순회하며 숨김 시트에 기록
            uniqueDepartments.forEach(dept => {
              listSheet.addRow([dept]);
            });
            listSheet.state = 'hidden'; 

            // 3. 메인 시트 생성 및 데이터 세팅
            const worksheet = workbook.addWorksheet('직원 명부');

            worksheet.columns = [
              { header: 'ID', key: 'id', width: 10 },
              { header: '이름', key: 'name', width: 20 },
              { header: '부서', key: 'department', width: 25 }
            ];

            this.employees.forEach(emp => {
              worksheet.addRow(emp);
            });

            // 4. 권한 제어 (이름, 부서 전체 열어두고 1행만 잠금)
            worksheet.getColumn('name').protection = { locked: false };
            worksheet.getColumn('department').protection = { locked: false };

            worksheet.getRow(1).eachCell((cell) => {
              cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFE0E0E0' } };
              cell.font = { bold: true };
              cell.alignment = { vertical: 'middle', horizontal: 'center' };
              cell.protection = { locked: true }; 
            });

            // 5. 유효성 검사(드롭다운) 적용
            // 데이터의 길이가 중복 제거 후 줄어들었으므로, 고유 배열의 길이를 사용합니다.
            const listLength = uniqueDepartments.length; 
            
            for (let i = 2; i <= 1000; i++) {
              worksheet.getCell(`C${i}`).dataValidation = {
                type: 'list',
                allowBlank: true,
                formulae: [`'데이터_목록'!$A$1:$A$${listLength}`],
                showErrorMessage: true,
                errorTitle: '잘못된 입력',
                error: '지정된 부서 목록 중에서만 선택해 주세요.'
              };
            }

            // 6. 시트 보호
            await worksheet.protect('1234', {
              selectLockedCells: true,
              selectUnlockedCells: true,
              insertRows: true,
              deleteRows: true,
              sort: true,
              autoFilter: true,
              formatCells: true,
              formatRows: true,
              formatColumns: true
            });

            // 7. 다운로드 실행
            const buffer = await workbook.xlsx.writeBuffer();
            const blob = new Blob([buffer], { 
              type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' 
            });
            
            saveAs(blob, '직원명부_중복제거_드롭다운.xlsx');

          } catch (error) {
            console.error('엑셀 생성 중 오류 발생:', error);
            alert('엑셀 다운로드에 실패했습니다.');
          }
        }
      }
    });
  </script>
</body>
</html>
