<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vue 2 & Bootstrap 4 - Excel Master Template</title>
  
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/css/bootstrap.min.css">
</head>
<body>

  <div id="app" class="container mt-5">
    <div class="row justify-content-center">
      <div class="col-md-9">
        
        <div class="card shadow-sm">
          <div class="card-body">
            <h5 class="card-title">직원 명부 엑셀 다운로드 (마스터 템플릿)</h5>
            <h6 class="card-subtitle mb-3 text-muted">모든 고급 기능(보호, 드롭다운, 중복방지, 메모) 통합 버전</h6>
            
            <div class="alert alert-success" role="alert">
              <ul class="mb-0 pl-3">
                <li><strong>ID 및 제목:</strong> 수정 불가 (메모 포함)</li>
                <li><strong>이름 열:</strong> 수정 및 빈칸 추가 가능 / <strong>동일한 이름 중복 입력 차단</strong></li>
                <li><strong>부서 열:</strong> 수정 및 빈칸 추가 가능 / <strong>중복이 제거된 드롭다운 목록 제공</strong></li>
                <li><strong>시트 제어:</strong> 행 삽입/삭제, 정렬, 열 너비 조절 모두 가능</li>
              </ul>
            </div>

            <table class="table table-bordered text-center mt-4">
              <thead class="thead-light">
                <tr>
                  <th>ID (수정불가)</th>
                  <th>이름 (중복불가)</th>
                  <th>부서 (목록선택)</th>
                </tr>
              </thead>
              <tbody>
                <tr v-for="emp in employees" :key="emp.id">
                  <td>{{ emp.id }}</td>
                  <td>{{ emp.name }}</td>
                  <td>{{ emp.department }}</td>
                </tr>
              </tbody>
            </table>

            <div class="text-right">
              <button class="btn btn-success" @click="downloadExcel">
                엑셀 파일로 다운로드 (.xlsx)
              </button>
            </div>

          </div>
        </div>

      </div>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/js/bootstrap.min.js"></script>
  
  <script src="https://cdn.jsdelivr.net/npm/vue@2.6.14/dist/vue.js"></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

  <script>
    new Vue({
      el: '#app',
      data() {
        return {
          // 중복된 데이터가 포함된 원본 부서 목록
          departmentList: ['개발팀', '디자인팀', '기획팀', '개발팀', '영업팀', '기획팀', '마케팅팀'],
          
          // 직원 초기 데이터
          employees: [
            { id: 1, name: '홍길동', department: '개발팀' },
            { id: 2, name: '김철수', department: '디자인팀' },
            { id: 3, name: '이영희', department: '기획팀' },
            { id: 4, name: '박민수', department: '영업팀' }
          ]
        }
      },
      methods: {
        async downloadExcel() {
          try {
            const workbook = new ExcelJS.Workbook();
            
            // ==========================================
            // [기능 1] 드롭다운을 위한 숨김 시트 생성 및 중복 제거
            // ==========================================
            const uniqueDepartments = [...new Set(this.departmentList)]; // Set으로 중복 제거
            const listSheet = workbook.addWorksheet('데이터_목록');
            
            uniqueDepartments.forEach(dept => {
              listSheet.addRow([dept]);
            });
            listSheet.state = 'hidden'; // 사용자에게는 보이지 않게 숨김 처리

            // ==========================================
            // [기능 2] 메인 시트 세팅 및 초기 데이터 삽입
            // ==========================================
            const worksheet = workbook.addWorksheet('직원 명부');

            worksheet.columns = [
              { header: 'ID', key: 'id', width: 10 },
              { header: '이름', key: 'name', width: 20 },
              { header: '부서', key: 'department', width: 25 }
            ];

            this.employees.forEach(emp => {
              const row = worksheet.addRow(emp);
              // [기능 3] 특정 조건(홍길동)에 맞는 셀에 메모(Note) 추가
              if (emp.name === '홍길동') {
                row.getCell('name').note = '2023년 우수 사원입니다.';
              }
            });

            // ==========================================
            // [기능 4] 셀 잠금 해제 및 헤더 설정 (ID 잠금 처리)
            // ==========================================
            // 이름과 부서 열 전체의 잠금을 풉니다. (빈 행 포함)
            worksheet.getColumn('name').protection = { locked: false };
            worksheet.getColumn('department').protection = { locked: false };

            // 첫 번째 행(헤더)을 디자인하고 다시 굳게 잠급니다.
            worksheet.getRow(1).eachCell((cell, colNumber) => {
              cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFE0E0E0' } };
              cell.font = { bold: true };
              cell.alignment = { vertical: 'middle', horizontal: 'center' };
              cell.protection = { locked: true }; 
              
              // ID 헤더(1열)에 시스템 안내 메모 추가
              if (colNumber === 1) {
                cell.note = 'ID 열은 시스템 고유 번호이므로\n임의로 수정하거나 삭제할 수 없습니다.';
              }
            });

            // ==========================================
            // [기능 5] 데이터 유효성 검사 (드롭다운 & 중복입력 방지)
            // 2행부터 1000행까지 넉넉하게 규칙을 적용합니다.
            // ==========================================
            const listLength = uniqueDepartments.length; 
            
            for (let i = 2; i <= 1000; i++) {
              // 1) 이름 열(B열): COUNTIF 수식을 이용한 중복 차단
              worksheet.getCell(`B${i}`).dataValidation = {
                type: 'custom',
                allowBlank: true,
                showErrorMessage: true,
                errorTitle: '중복 입력 오류',
                error: '이미 등록된 이름입니다. 중복되지 않는 다른 이름을 입력해 주세요.',
                formulae: [`COUNTIF($B$2:$B$1000, B${i})<=1`] 
              };

              // 2) 부서 열(C열): 숨겨진 시트를 참조하는 드롭다운
              worksheet.getCell(`C${i}`).dataValidation = {
                type: 'list',
                allowBlank: true,
                showErrorMessage: true,
                errorTitle: '잘못된 입력',
                error: '지정된 부서 목록 중에서만 선택해 주세요.',
                formulae: [`'데이터_목록'!$A$1:$A$${listLength}`]
              };
            }

            // ==========================================
            // [기능 6] 시트 전체 보호 (행 삽입 등 사용자 권한 부여)
            // ==========================================
            await worksheet.protect('1234', {
              selectLockedCells: true,
              selectUnlockedCells: true,
              insertRows: true,     // 새 행 삽입 허용 (데이터 추가용)
              deleteRows: true,     // 행 삭제 허용
              sort: true,           // 데이터 정렬 허용
              autoFilter: true,     // 자동 필터 허용
              formatCells: true,    // 셀 서식 변경 허용
              formatRows: true,
              formatColumns: true   // 열 너비 조절 허용
            });

            // ==========================================
            // [기능 7] 파일 생성 및 다운로드 (FileSaver)
            // ==========================================
            const buffer = await workbook.xlsx.writeBuffer();
            const blob = new Blob([buffer], { 
              type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' 
            });
            
            saveAs(blob, '직원명부_마스터템플릿.xlsx');

          } catch (error) {
            console.error('엑셀 생성 중 오류 발생:', error);
            alert('엑셀 다운로드에 실패했습니다.');
          }
        }
      }
    });
  </script>
</body>
</html>
