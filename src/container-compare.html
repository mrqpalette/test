<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Container 비교 테스트</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* 가시성을 위해 임의로 스타일을 추가했습니다 */
        body {
            padding-top: 20px;
            background-color: #f8f9fa;
        }
        .demo-box {
            padding: 20px;
            color: white;
            font-weight: bold;
            text-align: center;
            border-radius: 8px;
            margin-bottom: 30px;
        }
        .bg-container {
            background-color: #0d6efd; /* 파란색 */
        }
        .bg-fluid {
            background-color: #dc3545; /* 빨간색 */
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="demo-box bg-container">
            <h3>1. 일반 [.container]</h3>
            <p>브라우저 창을 좌우로 늘리거나 줄여보세요.</p>
            <p>특정 크기마다 너비가 단계별로 뚝-뚝 끊기며 변하고, 양옆에 여백이 남습니다.</p>
        </div>
    </div>

    <div class="container-fluid">
        <div class="demo-box bg-fluid">
            <h3>2. 플루이드 [.container-fluid]</h3>
            <p>브라우저 창을 어떻게 조절해도 상관없습니다.</p>
            <p>항상 화면 좌우 끝까지 100% 꽉 차는 너비를 유지합니다.</p>
        </div>
    </div>

</body>
</html>
