<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vue 2 & Bootstrap 4 - Excel ID Column Locked</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/css/bootstrap.min.css">
</head>
<body>

  <div id="app" class="container mt-5">
    <div class="row justify-content-center">
      <div class="col-md-8">
        
        <div class="card shadow-sm">
          <div class="card-body">
            <h5 class="card-title">직원 명부 엑셀 다운로드</h5>
            <h6 class="card-subtitle mb-3 text-muted">ID 열 잠금 완벽 적용</h6>
            
            <div class="alert alert-info" role="alert">
              <strong>안내:</strong> 다운로드된 엑셀 파일은 <strong>ID 열</strong>이 잠겨 있어 수정할 수 없으며, <strong>이름과 부서</strong>만 수정 가능합니다.
            </div>

            <table class="table table-bordered text-center mt-3">
              <thead class="thead-light">
                <tr>
                  <th>ID (수정불가)</th>
                  <th>이름 (수정가능)</th>
                  <th>부서 (수정가능)</th>
                </tr>
              </thead>
              <tbody>
                <tr v-for="emp in employees" :key="emp.id">
                  <td>{{ emp.id }}</td>
                  <td>{{ emp.name }}</td>
                  <td>{{ emp.department }}</td>
                </tr>
              </tbody>
            </table>

            <div class="text-right">
              <button class="btn btn-success" @click="downloadExcel">
                엑셀 파일로 다운로드 (.xlsx)
              </button>
            </div>

          </div>
        </div>

      </div>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/js/bootstrap.min.js"></script>
  
  <script src="https://cdn.jsdelivr.net/npm/vue@2.6.14/dist/vue.js"></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

  <script>
    new Vue({
      el: '#app',
      data() {
        return {
          employees: [
            { id: 1, name: '홍길동', department: '개발팀' },
            { id: 2, name: '김철수', department: '디자인팀' },
            { id: 3, name: '이영희', department: '기획팀' },
            { id: 4, name: '박민수', department: '영업팀' }
          ]
        }
      },
      methods: {
        async downloadExcel() {
          try {
            const workbook = new ExcelJS.Workbook();
            const worksheet = workbook.addWorksheet('직원 명부');

            // 1. 헤더 세팅
            worksheet.columns = [
              { header: 'ID', key: 'id', width: 10 },
              { header: '이름', key: 'name', width: 20 },
              { header: '부서', key: 'department', width: 25 }
            ];

            // 2. 헤더 스타일링
            worksheet.getRow(1).eachCell((cell) => {
              cell.fill = {
                type: 'pattern',
                pattern: 'solid',
                fgColor: { argb: 'FFE0E0E0' }
              };
              cell.font = { bold: true };
              cell.alignment = { vertical: 'middle', horizontal: 'center' };
            });

            // 3. 데이터 추가
            this.employees.forEach(emp => {
              worksheet.addRow(emp);
            });

            // ==========================================
            // [핵심] ID열만 잠그고 이름, 부서는 수정 가능하게 하는 로직
            // ==========================================
            
            // 단계 1: 시트 전체를 잠금 처리합니다 (ID, 이름, 부서 모두 잠김)
            await worksheet.protect('1234', {
              selectLockedCells: true,
              selectUnlockedCells: true,
            });

            // 단계 2: 이름(name) 열의 잠금을 해제합니다.
            // rowNumber > 1 조건은 1행(헤더)을 잠금 상태로 유지하기 위함입니다.
            worksheet.getColumn('name').eachCell((cell, rowNumber) => {
              if (rowNumber > 1) {
                cell.protection = { locked: false };
              }
            });

            // 단계 3: 부서(department) 열의 잠금을 해제합니다.
            worksheet.getColumn('department').eachCell((cell, rowNumber) => {
              if (rowNumber > 1) {
                cell.protection = { locked: false };
              }
            });
            
            // 결과적으로 ID열은 잠금이 해제되지 않았으므로 '수정 불가' 상태로 남게 됩니다.
            // ==========================================

            // 4. 파일 생성 및 다운로드
            const buffer = await workbook.xlsx.writeBuffer();
            const blob = new Blob([buffer], { 
              type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' 
            });
            
            saveAs(blob, '직원명부_ID잠금.xlsx');

          } catch (error) {
            console.error('엑셀 생성 중 오류 발생:', error);
            alert('엑셀 다운로드에 실패했습니다.');
          }
        }
      }
    });
  </script>
</body>
</html>
