<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>모바일 앱 스타일 트랜스폼 회원가입 폼</title>

  <link type="text/css" rel="stylesheet" href="https://unpkg.com/bootstrap@4.6.2/dist/css/bootstrap.min.css" />
  <link type="text/css" rel="stylesheet" href="https://unpkg.com/bootstrap-vue@2.23.1/dist/bootstrap-vue.min.css" />

  <script src="https://unpkg.com/feather-icons"></script>

  <script src="https://unpkg.com/vue@2.6.14/dist/vue.min.js"></script>
  <script src="https://unpkg.com/bootstrap-vue@2.23.1/dist/bootstrap-vue.min.js"></script>

  <style>
    /* =======================================================================
     * 1. PC / 데스크톱 모드 기본 레이아웃 (원본 스타일 가이드 완벽 보존)
     * ======================================================================= */
    .sample-content-area {
      min-height: calc(100vh - calc(calc(2rem * 1) + 4.45rem + 3.35rem + 1.3rem + 0rem + 3.75rem));
      background-color: #f24a45; /* 원본 빨간색 테마 유지 */
      position: relative;           
      width: 100%;                  
      display: flex;                
      flex-direction: column;       
      overflow: visible;     
      transition: margin 0.5s ease-in-out, width 0.5s ease-in-out;       
    }

    /* 패널 리사이즈용 부드러운 애니메이션 선언 */
    .animated-left-panel {
      transition: all 0.5s ease-in-out;
      opacity: 1;
      visibility: visible;
      padding-left: 0.25rem !important;
      padding-right: 0.25rem !important;
    }
    .animated-right-panel {
      transition: all 0.5s ease-in-out;
      padding-left: 0.25rem !important;
      padding-right: 0.25rem !important;
    }

    /* 768px 미만일 때 왼쪽 가입 혜택단이 스무스하게 수축하기 위한 클래스 */
    .panel-collapsed {
      flex: 0 0 0% !important;
      max-width: 0% !important;
      width: 0 !important;
      padding: 0 !important;
      opacity: 0 !important;
      overflow: hidden !important;
      visibility: hidden;
    }

    /* PC 뷰일 때 레이블 텍스트 정렬 */
    .pc-text-label {
      font-weight: 600;
      color: #4e5154;
    }

    /* PC 모드일 때는 모바일용 라인 아이콘을 철저히 숨김 */
    .mobile-icon-wrapper {
      display: none !important;
    }

    /* =======================================================================
     * 2. [🔥 핵심 튜닝] 768px 미만(모바일/태블릿) 진입 시 캡처 UI 스타일 덮어쓰기
     * ======================================================================= */
    @media (max-width: 767.98px) {
      /* 캡처본처럼 눈이 편안한 앱 전용 배경색으로 전환 */
      .sample-content-area {
        background-color: #f8f9fa !important;
      }

      /* 모바일일 때 카드의 그림자와 사각형 테두리를 완전히 제거하고 플랫화 */
      .signup-card {
        border: none !important;
        background-color: transparent !important;
        box-shadow: none !important;
      }
      .signup-card .card-body {
        padding: 0 !important;
      }

      /* 회원가입 제목 숨기기 또는 상단바 핏으로 슬림화 */
      .signup-card h3 {
        font-size: 1.25rem !important;
        margin-bottom: 1.5rem !important;
        color: #1e1e1e;
      }

      /* [캡처 매핑] 부트스트랩 그룹 폼 하나하나를 흰색 가로 1단 리스트 행으로 강제 변경 */
      .signup-card .form-group {
        display: flex !important;
        align-items: center !important;
        background-color: #ffffff !important;
        border-bottom: 1px solid #f1f1f5 !important;
        margin-bottom: 0 !important; /* 부트스트랩 기본 하단 마진 제거 */
        padding: 14px 16px !important;
        transition: all 0.5s ease-in-out;
      }

      /* 첫 번째 항목과 마지막 항목에 부드러운 라운딩을 주어 이쁜 세그먼트 박스 연출 */
      .signup-card .form-group:nth-of-type(1) {
        border-top-left-radius: 12px;
        border-top-right-radius: 12px;
      }
      .signup-card .form-group:nth-of-type(4) {
        border-bottom-left-radius: 12px;
        border-bottom-right-radius: 12px;
        border-bottom: none !important;
      }

      /* [캡처 매핑] 모바일 진입 시 기존의 한글 라벨("이메일 주소", "비밀번호")을 강제로 숨김 */
      .signup-card .form-group label {
        display: none !important;
      }

      /* [캡처 매핑] 숨겨진 라벨 대신 캡처 화면과 동일한 라인 아이콘 영역을 강제 부활시킴 */
      .signup-card .form-group .mobile-icon-wrapper {
        display: inline-flex !important;
        align-items: center;
        justify-content: center;
        width: 30px;
        min-width: 30px;
        color: #4e5154;
        margin-right: 12px;
      }

      /* [캡처 매핑] 부트스트랩 인풋의 딱딱한 테두리 상자를 완전히 제거하고 투명하게 처리 */
      .signup-card .form-control {
        border: none !important;
        border-radius: 0 !important;
        padding: 0 !important;
        background-color: transparent !important;
        font-size: 1rem !important;
        color: #1e1e1e !important;
        height: auto !important;
      }
      /* 포커스(클릭) 시 파란색 외곽선 생기는 현상 완전히 제거 */
      .signup-card .form-control:focus {
        box-shadow: none !important;
        background-color: transparent !important;
      }

      /* 모바일용 계정 생성 버튼 앱 스타일 피팅 */
      .signup-card .btn-primary {
        border-radius: 12px !important;
        padding: 14px !important;
        font-size: 1.05rem;
        background-color: #7367f0 !important; /* Vuexy 메인 포인트 컬러 매핑 */
        border: none !important;
      }
    }

    /* xs 세로모바일 진입 시 좌우 여백 밀착 튜닝 (all transition 연동) */
    @media (max-width: 575.98px) {
      .sample-content-area {
        margin-left: -1rem !important;       
        margin-right: -1rem !important;      
        width: calc(100% + 2rem) !important; 
      }
      .animated-left-panel, .animated-right-panel {
        padding-left: 0px !important;
        padding-right: 0px !important;
      }
      .signup-card {
        padding: 0 16px !important; /* 모바일 양옆 기본 숨쉬는 여백 확보 */
      }
    }
  </style>
</head>
<body>

  <div id="app">
    <div class="sample-content-area">
      <div ref="myContainerWrapper" class="container-fluid p-0">
        
        <div v-if="true" class="p-1 bg-info text-white font-weight-bold text-center">
          <ul class="list-unstyled border rounded bg-white text-left p-2 m-0 text-dark" style="font-size: 0.85rem;">
            <li>브라우저 창 너비: {{ windowWidth }} px</li>
            <li>현재 활성 Breakpoint:
              <span v-if="windowWidth < 576" class="badge badge-danger">xs (폰 세로)</span>
              <span v-else-if="windowWidth < 768" class="badge badge-warning">sm (폰 가로)</span>
              <span v-else-if="windowWidth < 992" class="badge badge-success">md (태블릿)</span>
              <span v-else-if="windowWidth < 1200" class="badge badge-primary">lg (PC)</span>
              <span v-else class="badge badge-info">xl+ (와이드)</span>
            </li>
          </ul>
        </div>

        <div class="row justify-content-center m-0 flex-nowrap" style="overflow: hidden;">
          
          <div
            class="col-md-5 col-lg-4 d-flex animated-left-panel"
            :class="{'panel-collapsed': !isMdAndUp}"
            style="background-color: #13e910; height: 100%; overflow-y: auto;"
          >
            <div class="pr-md-4 text-dark p-3" style="min-width: 250px;">
              <h2 class="font-weight-bold mb-3">환영합니다! 👋</h2>
              <p class="text-muted style-line-height">
                하나의 계정으로 서비스의 모든 기능을 제한 없이 이용하실 수 있습니다.
              </p>
              <ul class="list-unstyled text-muted mt-4">
                <li class="mb-2">✔️ 실시간 데이터 동기화</li>
                <li class="mb-2">✔️ 반응형 레이아웃 템플릿 제공</li>
                <li class="mb-2">✔️ 철저한 보안 및 개인정보 암호화</li>
              </ul>
            </div>
          </div>

          <div
            class="col-sm-10 col-md-7 col-lg-5 animated-right-panel"
            style="background-color: #f5f16f;"
          >
            <b-card class="shadow-sm border-0 signup-card m-3">
              <h3 class="text-center font-weight-bold">회원가입</h3>

              <b-form @submit.prevent="handleSubmit">
                
                <b-form-group label="이메일 주소" label-for="email">
                  <div class="mobile-icon-wrapper">
                    <i data-feather="mail" style="width: 18px; height: 18px;"></i>
                  </div>
                  <b-form-input id="email" v-model="form.email" type="email" placeholder="example@email.com" required />
                </b-form-group>

                <b-form-group label="비밀번호" label-for="password">
                  <div class="mobile-icon-wrapper">
                    <i data-feather="lock" style="width: 18px; height: 18px;"></i>
                  </div>
                  <b-form-input id="password" v-model="form.password" type="password" placeholder="8자 이상 입력하세요" required />
                </b-form-group>

                <b-form-group label="이름" label-for="name">
                  <div class="mobile-icon-wrapper">
                    <i data-feather="user" style="width: 18px; height: 18px;"></i>
                  </div>
                  <b-form-input id="name" v-model="form.name" type="text" placeholder="홍길동" required />
                </b-form-group>

                <b-form-group class="mt-4">
                  <div class="mobile-icon-wrapper">
                    <i data-feather="check-square" style="width: 18px; height: 18px; color: #7367f0;"></i>
                  </div>
                  <b-form-checkbox v-model="form.agreeTerms" required>
                    이용약관 및 개인정보 처리방침 동의 (필수)
                  </b-form-checkbox>
                </b-form-group>

                <b-button type="submit" variant="primary" block class="py-2 mt-4 font-weight-bold">
                  계정 생성하기
                </b-button>
              </b-form>

              <div class="text-center mt-4">
                <small class="text-muted">
                  이미 계정이 있으신가요? <a href="#" class="text-primary">로그인하기</a>
                </small>
              </div>
            </b-card>
          </div>

        </div> </div> 
    </div> 
  </div> 

  <script>
    Vue.use(BootstrapVue);

    new Vue({
      el: '#app',
      data() {
        return {
          windowWidth: window.innerWidth,
          form: { email: '', password: '', name: '', agreeTerms: false }
        }
      },
      computed: {
        isMdAndUp() {
          return this.windowWidth >= 768
        }
      },
      mounted() {
        window.addEventListener('resize', this.handleResize);
        // Feather 아이콘 렌더링 초기화
        feather.replace();
      },
      updated() {
        // 반응형 변동 시 아이콘 유실 방지 리랜더링
        feather.replace();
      },
      beforeDestroy() {
        window.removeEventListener('resize', this.handleResize)
      },
      methods: {
        handleResize() {
          this.windowWidth = window.innerWidth
        },
        handleSubmit() {
          alert(`${this.form.name}님, 가입을 축하합니다!`)
        }
      }
    });
  </script>
</body>
</html>
