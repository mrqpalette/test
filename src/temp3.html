<!DOCTYPE html>
<html>
<head>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.26.0/cytoscape.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dagre/0.8.5/dagre.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/cytoscape-dagre@2.5.0/cytoscape-dagre.min.js"></script>
    
    <style>
        #cy { width: 100%; height: 800px; background: #fafafa; border: 1px solid #ddd; }
        #info-panel { height: 150px; background: #eee; padding: 15px; }
    </style>
</head>
<body>
    <div id="cy"></div>
    <div id="info-panel">
        <div id="status">노드를 클릭하면 정보를 표시합니다.</div>
    </div>

    <script>
        cytoscape.use(cytoscapeDagre);

        var cy = cytoscape({
            container: document.getElementById('cy'),
            elements: [
                // Source Layer
                { data: { id: 'A' } }, { data: { id: 'B' } }, { data: { id: 'C' } },
                // Intermediate
                { data: { id: 'D' } },
                // Final
                { data: { id: 'F' } },
                // Edges (source -> target 방향을 확실히 지켜야 함)
                { data: { source: 'A', target: 'D' } },
                { data: { source: 'B', target: 'D' } },
                { data: { source: 'C', target: 'D' } },
                { data: { source: 'D', target: 'F' } }
            ],
            style: [
                { selector: 'node', style: { 'label': 'data(id)', 'background-color': '#4a90e2', 'color': '#fff' } },
                { selector: 'edge', style: { 'width': 2, 'line-color': '#999', 'target-arrow-shape': 'triangle' } }
            ],
            // 핵심: LR(Left to Right) 방향 강제
            layout: { 
                name: 'dagre',
                rankDir: 'LR',
                nodeSep: 50, // 노드 간 가로 간격
                rankSep: 100 // 계층 간 세로 간격
            }
        });

        // 클릭 이벤트 (선/후행 정보)
        cy.on('tap', 'node', function(evt){
            var node = evt.target;
            // predecessors: 왼쪽(상위), successors: 오른쪽(하위)
            var pre = node.predecessors().nodes().map(n => n.id()).join(', ');
            var suc = node.successors().nodes().map(n => n.id()).join(', ');
            
            document.getElementById('status').innerHTML = 
                `<strong>[${node.id()}]</strong><br>
                 선행 작업(Upstream): ${pre || '없음'}<br>
                 후행 작업(Downstream): ${suc || '없음'}`;
        });
    </script>
</body>
</html>
