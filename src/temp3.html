<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>ETL Pipeline Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.26.0/cytoscape.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dagre/0.8.5/dagre.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/cytoscape-dagre@2.5.0/cytoscape-dagre.min.js"></script>
    
    <style>
        body { margin: 0; font-family: 'Malgun Gothic', sans-serif; display: flex; flex-direction: column; height: 100vh; }
        #cy { flex-grow: 1; border-bottom: 3px solid #333; background: #fdfdfd; }
        #info-panel { height: 250px; padding: 20px; background: #2c3e50; color: #ecf0f1; overflow-y: auto; }
        .info-title { font-size: 1.2em; border-bottom: 1px solid #7f8c8d; padding-bottom: 5px; margin-bottom: 10px; }
        .info-content { font-size: 1em; line-height: 1.8; }
    </style>
</head>
<body>
    <div id="cy"></div>
    <div id="info-panel">
        <div class="info-title" id="node-title">작업 상세 정보</div>
        <div class="info-content" id="node-desc">노드를 클릭하면 해당 노드와 직속 관계가 강조됩니다.</div>
    </div>

    <script>
        const rawData = [
            { id: 'A', label: '로그 수집', prev: null, next: 'D', info: '웹 서버 로그를 수집함.' },
            { id: 'B', label: 'DB 덤프', prev: null, next: 'D', info: '메인 DB 덤프 작업.' },
            { id: 'C', label: '외부 API 연동', prev: null, next: 'D', info: '환율 정보 연동.' },
            { id: 'D', label: '데이터 조인', prev: ['A','B','C'], next: 'F', info: '조인하여 마트 생성.' },
            { id: 'E', label: '기준정보 참조', prev: null, next: 'F', info: '고객 마스터 조회.' },
            { id: 'F', label: '최종 적재', prev: ['D','E'], next: null, info: '최종 적재 작업.' }
        ];

        function processData(data) {
            const nodes = [];
            const edges = [];
            const nodeIds = new Set();
            data.forEach(item => {
                if (!nodeIds.has(item.id)) {
                    nodes.push({ data: { id: item.id, label: item.label, info: item.info } });
                    nodeIds.add(item.id);
                }
                if (item.prev) {
                    const prevs = Array.isArray(item.prev) ? item.prev : [item.prev];
                    prevs.forEach(p => edges.push({ data: { source: p, target: item.id } }));
                }
            });
            return { nodes, edges };
        }

        cytoscape.use(cytoscapeDagre);
        const cy = cytoscape({
            container: document.getElementById('cy'),
            elements: processData(rawData),
            style: [
                { selector: 'node', style: { 'label': 'data(label)', 'text-wrap': 'wrap', 'text-max-width': '80px', 'background-color': '#3498db', 'color': '#fff', 'text-valign': 'center', 'width': 80, 'height': 80 } },
                { selector: 'edge', style: { 'target-arrow-shape': 'triangle', 'curve-style': 'bezier', 'line-color': '#95a5a6', 'width': 3 } },
                
                // [핵심] 상태에 따른 스타일 정의
                { selector: '.dimmed', style: { 'opacity': '0.1' } },
                { selector: '.highlight', style: { 'opacity': '1', 'background-color': '#e74c3c', 'border-width': '4px', 'border-color': '#c0392b' } }
            ],
            layout: { name: 'dagre', rankDir: 'LR', rankSep: 150, nodeSep: 50 }
        });

        cy.on('tap', 'node', function(evt){
            const node = evt.target;
            
            // 1. 모든 요소 초기화
            cy.elements().removeClass('highlight dimmed');
            cy.elements().addClass('dimmed');

            // 2. 선택 노드와 직속 부모/자식 설정
            const focus = node.union(node.incomers()).union(node.outgoers());
            
            // 3. 관계 요소들 강조 (dimmed 제거 후 highlight 적용)
            focus.removeClass('dimmed').addClass('highlight');

            // 4. 정보창 업데이트
            const parents = node.incomers().nodes().map(n => n.data('label')).join(', ');
            const children = node.outgoers().nodes().map(n => n.data('label')).join(', ');
            
            document.getElementById('node-title').innerText = `작업명: ${node.data('label')} (${node.id()})`;
            document.getElementById('node-desc').innerHTML = `
                <p><strong>상세 설명:</strong> ${node.data('info')}</p>
                <p><strong>직속 선행 작업:</strong> ${parents || '없음'}</p>
                <p><strong>직속 후행 작업:</strong> ${children || '없음'}</p>
            `;
        });

        // 배경 클릭 시 초기화
        cy.on('tap', function(evt){
            if(evt.target === cy){
                cy.elements().removeClass('highlight dimmed');
            }
        });
    </script>
</body>
</html>
