<!DOCTYPE html>
<html>
<head>
    <script src="cytoscape.min.js"></script>
    <script src="dagre.min.js"></script>
    <script src="cytoscape-dagre.js"></script>
    <style>
        #cy { width: 100%; height: 900px; border: 1px solid #ccc; }
    </style>
</head>
<body>
    <div id="cy"></div>
    <script>
        var cy = cytoscape({
            container: document.getElementById('cy'),
            elements: [
                // 데이터는 여기에 JSON 형식으로 들어갑니다.
                { data: { id: 'A' } }, { data: { id: 'B' } }, { data: { id: 'C' } },
                { data: { id: 'D' } }, { data: { id: 'E' } }, { data: { id: 'F' } },
                { data: { source: 'A', target: 'D' } },
                { data: { source: 'B', target: 'D' } },
                { data: { source: 'C', target: 'D' } },
                { data: { source: 'D', target: 'F' } },
                { data: { source: 'E', target: 'F' } }
            ],
            style: [
                { selector: 'node', style: { 'label': 'data(id)', 'background-color': '#666' } },
                { selector: 'edge', style: { 'width': 3, 'line-color': '#ccc', 'target-arrow-shape': 'triangle' } }
            ],
            layout: { name: 'dagre' } // 자동 계층 레이아웃 적용
        });
    </script>
</body>
</html>
