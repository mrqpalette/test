<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>ETL Pipeline Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.26.0/cytoscape.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dagre/0.8.5/dagre.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/cytoscape-dagre@2.5.0/cytoscape-dagre.min.js"></script>
    
    <style>
        body { margin: 0; font-family: 'Malgun Gothic', sans-serif; display: flex; flex-direction: column; height: 100vh; }
        #cy { flex-grow: 1; border-bottom: 3px solid #333; background: #fdfdfd; }
        #info-panel { height: 250px; padding: 20px; background: #2c3e50; color: #ecf0f1; overflow-y: auto; }
        .info-title { font-size: 1.2em; border-bottom: 1px solid #7f8c8d; padding-bottom: 5px; margin-bottom: 10px; }
        .info-content { font-size: 1em; line-height: 1.8; }
    </style>
</head>
<body>
    <div id="cy"></div>
    <div id="info-panel">
        <div class="info-title" id="node-title">작업 상세 정보</div>
        <div class="info-content" id="node-desc">노드를 클릭하면 여정과 관계가 표시됩니다.</div>
    </div>

    <script>
        // 복잡한 ETL 흐름 예시 데이터 (여러 선행 작업이 모이고, 다시 갈라지는 구조)
        const rawData = [
            { id: 'A', label: '로그 수집', prev: null, next: 'D', info: '소스: 웹 로그' },
            { id: 'B', label: 'DB 덤프', prev: null, next: 'D', info: '소스: 메인 DB' },
            { id: 'C', label: 'API 연동', prev: null, next: 'D', info: '소스: 외부 환율' },
            { id: 'D', label: '데이터 조인', prev: ['A','B','C'], next: 'E', info: '3개 소스 조인' },
            { id: 'E', label: '기준정보 매핑', prev: 'D', next: ['F','G'], info: '마스터 코드 매핑' },
            { id: 'F', label: '리포트 생성', prev: 'E', next: 'H', info: '일간 리포트' },
            { id: 'G', label: '백업 생성', prev: 'E', next: 'H', info: '로그 백업' },
            { id: 'H', label: '최종 적재', prev: ['F','G'], next: null, info: 'DW 적재 완료' }
        ];

        function processData(data) {
            const nodes = []; const edges = []; const nodeIds = new Set();
            data.forEach(item => {
                if (!nodeIds.has(item.id)) {
                    nodes.push({ data: { id: item.id, label: item.label, info: item.info } });
                    nodeIds.add(item.id);
                }
                if (item.prev) {
                    const prevs = Array.isArray(item.prev) ? item.prev : [item.prev];
                    prevs.forEach(p => edges.push({ data: { source: p, target: item.id } }));
                }
            });
            return { nodes, edges };
        }

        cytoscape.use(cytoscapeDagre);
        const cy = cytoscape({
            container: document.getElementById('cy'),
            elements: processData(rawData),
            style: [
                // [기본 상태] 회색 계열 (빨간색 탈피)
                { selector: 'node', style: { 'label': 'data(label)', 'text-wrap': 'wrap', 'text-max-width': '80px', 'background-color': '#95a5a6', 'color': '#fff', 'text-valign': 'center', 'width': 80, 'height': 80 } },
                { selector: 'edge', style: { 'target-arrow-shape': 'triangle', 'curve-style': 'bezier', 'line-color': '#bdc3c7', 'width': 3 } },
                
                { selector: '.dimmed', style: { 'opacity': '0.1' } },
                { selector: '.selected', style: { 'background-color': '#3498db', 'border-width': '5px', 'border-color': '#2980b9' } },
                { selector: '.predecessor', style: { 'background-color': '#2ecc71', 'border-width': '3px', 'border-color': '#27ae60' } }, // 직속 선행 (초록)
                { selector: '.direct-child', style: { 'background-color': '#f39c12', 'border-width': '3px', 'border-color': '#d35400' } }, // 직속 후행 (주황)
                { selector: '.full-journey', style: { 'background-color': '#8e44ad', 'border-width': '3px', 'border-color': '#5b2c6f' } }  // 전체 여정 (보라)
            ],
            layout: { name: 'dagre', rankDir: 'LR', rankSep: 150, nodeSep: 50 }
        });

        cy.on('tap', 'node', function(evt){
            const node = evt.target;
            const isAlreadySelected = node.hasClass('selected');

            cy.elements().removeClass('selected predecessor direct-child full-journey dimmed');

            if (!isAlreadySelected) {
                cy.elements().addClass('dimmed');
                
                node.removeClass('dimmed').addClass('selected');
                // 선행(직속)
                node.incomers().nodes().removeClass('dimmed').addClass('predecessor');
                // 후행(직속)
                node.outgoers().nodes().removeClass('dimmed').addClass('direct-child');
                // 후행(직속 제외한 나머지 여정)
                node.successors().nodes().not(node.outgoers().nodes()).removeClass('dimmed').addClass('full-journey');

                const parents = node.incomers().nodes().map(n => n.data('label')).join(', ');
                const journey = node.successors().nodes().map(n => n.data('label')).join(' → ');
                
                document.getElementById('node-title').innerText = `작업명: ${node.data('label')} (${node.id()})`;
                document.getElementById('node-desc').innerHTML = `
                    <p><strong>상세 설명:</strong> ${node.data('info')}</p>
                    <p><strong>직속 선행:</strong> ${parents || '없음'}</p>
                    <p><strong>후행 여정:</strong> ${journey || '도착점'}</p>
                `;
            } else {
                document.getElementById('node-title').innerText = `작업 상세 정보`;
                document.getElementById('node-desc').innerHTML = `노드를 클릭하면 여정과 관계가 표시됩니다.`;
            }
        });

        cy.on('tap', function(evt){ if(evt.target === cy) cy.elements().removeClass('selected predecessor direct-child full-journey dimmed'); });
    </script>
</body>
</html>
