<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>ETL Pipeline Dashboard (Stress Test)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.26.0/cytoscape.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dagre/0.8.5/dagre.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/cytoscape-dagre@2.5.0/cytoscape-dagre.min.js"></script>
    
    <style>
        body { margin: 0; font-family: 'Malgun Gothic', sans-serif; display: flex; flex-direction: column; height: 100vh; }
        #cy { flex-grow: 1; border-bottom: 3px solid #333; background: #fdfdfd; }
        #info-panel { height: 250px; padding: 20px; background: #2c3e50; color: #ecf0f1; overflow-y: auto; }
    </style>
</head>
<body>
    <div id="cy"></div>
    <div id="info-panel">
        <div id="node-title" style="font-size: 1.2em; border-bottom: 1px solid #7f8c8d; margin-bottom:10px;">작업 상세 정보</div>
        <div id="node-desc">노드를 클릭하면 여정과 관계가 표시됩니다.</div>
    </div>

    <script>
        // [복잡한 구조의 예시 데이터] 
        // 여러 소스(A~E) -> 중간 조인(F,G) -> 연산(H,I,J) -> 최종 적재(K,L)
        const rawData = [
            // Layer 1: Ingestion
            { id: 'A', label: '로그수집-Web', prev: null, next: 'F', info: '웹 서버 로그 수집' },
            { id: 'B', label: '로그수집-App', prev: null, next: 'F', info: '앱 서버 로그 수집' },
            { id: 'C', label: 'DB덤프-User', prev: null, next: 'G', info: '유저 정보 덤프' },
            { id: 'D', label: 'DB덤프-Order', prev: null, next: 'G', info: '주문 정보 덤프' },
            { id: 'E', label: '외부API-환율', prev: null, next: 'H', info: '환율 정보' },
            
            // Layer 2: Preprocessing
            { id: 'F', label: '로그 정제', prev: ['A', 'B'], next: 'I', info: '로그 통합 및 정제' },
            { id: 'G', label: '데이터 매핑', prev: ['C', 'D'], next: 'I', info: '데이터 코드 매핑' },
            
            // Layer 3: Main Logic
            { id: 'H', label: '환율 계산', prev: 'E', next: 'I', info: '현지 통화 환산' },
            { id: 'I', label: '메인 데이터 조인', prev: ['F', 'G', 'H'], next: ['J', 'K'], info: '전사 마트 조인' },
            
            // Layer 4: Aggregation & Final Load
            { id: 'J', label: '일간 리포트', prev: 'I', next: 'L', info: '경영진 리포트' },
            { id: 'K', label: '월간 통계', prev: 'I', next: 'L', info: '월간 마케팅 지표' },
            { id: 'L', label: '데이터 웨어하우스', prev: ['J', 'K'], next: null, info: '최종 적재' }
        ];

        function processData(data) {
            const nodes = []; const edges = []; const nodeIds = new Set();
            data.forEach(item => {
                if (!nodeIds.has(item.id)) {
                    nodes.push({ data: { id: item.id, label: item.label, info: item.info } });
                    nodeIds.add(item.id);
                }
                if (item.prev) {
                    const prevs = Array.isArray(item.prev) ? item.prev : [item.prev];
                    prevs.forEach(p => edges.push({ data: { source: p, target: item.id } }));
                }
            });
            return { nodes, edges };
        }

        cytoscape.use(cytoscapeDagre);
        const cy = cytoscape({
            container: document.getElementById('cy'),
            elements: processData(rawData),
            style: [
                { selector: 'node', style: { 'label': 'data(label)', 'text-wrap': 'wrap', 'text-max-width': '80px', 'background-color': '#95a5a6', 'color': '#fff', 'text-valign': 'center', 'width': 80, 'height': 80 } },
                { selector: 'edge', style: { 'line-color': '#bdc3c7', 'width': 3, 'curve-style': 'bezier', 'target-arrow-shape': 'triangle' } },
                { selector: '.dimmed', style: { 'opacity': '0.1' } },
                { selector: '.selected', style: { 'background-color': '#3498db', 'border-width': '5px', 'border-color': '#2980b9' } },
                { selector: '.predecessor', style: { 'background-color': '#27ae60' } }, 
                { selector: '.successor-direct', style: { 'background-color': '#d35400' } }, 
                { selector: '.successor-journey', style: { 'background-color': '#8e44ad' } },
                { selector: '.edge-predecessor', style: { 'line-style': 'dashed', 'line-color': '#27ae60', 'width': 4 } },
                { selector: '.edge-successor', style: { 'line-style': 'solid', 'line-color': '#d35400', 'width': 4 } }
            ],
            layout: { name: 'dagre', rankDir: 'LR', rankSep: 150, nodeSep: 50 }
        });

        cy.on('tap', 'node', function(evt){
            const node = evt.target;
            const isAlreadySelected = node.hasClass('selected');
            cy.elements().removeClass('selected predecessor successor-direct successor-journey dimmed edge-predecessor edge-successor');

            if (!isAlreadySelected) {
                cy.elements().addClass('dimmed');
                node.removeClass('dimmed').addClass('selected');
                
                node.incomers().nodes().removeClass('dimmed').addClass('predecessor');
                node.incomers().edges().removeClass('dimmed').addClass('edge-predecessor');
                
                const directChildren = node.outgoers().nodes();
                directChildren.removeClass('dimmed').addClass('successor-direct');
                
                const journey = node.successors().nodes().not(directChildren);
                journey.removeClass('dimmed').addClass('successor-journey');
                
                node.outgoers().edges().removeClass('dimmed').addClass('edge-successor');

                document.getElementById('node-title').innerText = `작업명: ${node.data('label')}`;
                document.getElementById('node-desc').innerHTML = `
                    <p><strong>상세:</strong> ${node.data('info')}</p>
                    <p><strong>선행(부모):</strong> ${node.incomers().nodes().map(n => n.data('label')).join(', ') || '없음'}</p>
                    <p><strong>후행(여정):</strong> ${node.successors().nodes().map(n => n.data('label')).join(' → ') || '도착점'}</p>
                `;
            }
        });
        cy.on('tap', function(evt){ if(evt.target === cy) cy.elements().removeClass('selected predecessor successor-direct successor-journey dimmed edge-predecessor edge-successor'); });
    </script>
</body>
</html>
